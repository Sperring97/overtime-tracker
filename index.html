<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Overtime">
    <title>Overtime Tracker</title>
    
    <!-- App Icons -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Cdefs%3E%3ClinearGradient id='grad' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%238b5cf6;stop-opacity:1' /%3E%3Cstop offset='100%25' style='stop-color:%233b82f6;stop-opacity:1' /%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='180' height='180' rx='40' fill='url(%23grad)'/%3E%3Cpath d='M90 45 L90 95 L120 110' stroke='white' stroke-width='8' stroke-linecap='round' fill='none'/%3E%3Ccircle cx='90' cy='90' r='50' stroke='white' stroke-width='6' fill='none'/%3E%3C/svg%3E">
    
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%238b5cf6'/%3E%3Cpath d='M50 25 L50 52 L70 60' stroke='white' stroke-width='5' stroke-linecap='round' fill='none'/%3E%3Ccircle cx='50' cy='50' r='28' stroke='white' stroke-width='4' fill='none'/%3E%3C/svg%3E">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overscroll-behavior: none;
        }
        
        * {
            -webkit-tap-highlight-color: transparent;
        }
        
        input[type="time"],
        input[type="number"] {
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const Clock = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10" strokeWidth="2"/>
                <path d="M12 6v6l4 2" strokeWidth="2" strokeLinecap="round"/>
            </svg>
        );
        
        const Calendar = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2" strokeWidth="2"/>
                <line x1="16" y1="2" x2="16" y2="6" strokeWidth="2"/>
                <line x1="8" y1="2" x2="8" y2="6" strokeWidth="2"/>
                <line x1="3" y1="10" x2="21" y2="10" strokeWidth="2"/>
            </svg>
        );
        
        const Download = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" strokeWidth="2" strokeLinecap="round"/>
                <polyline points="7 10 12 15 17 10" strokeWidth="2" strokeLinecap="round"/>
                <line x1="12" y1="15" x2="12" y2="3" strokeWidth="2" strokeLinecap="round"/>
            </svg>
        );
        
        const Upload = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" strokeWidth="2" strokeLinecap="round"/>
                <polyline points="17 8 12 3 7 8" strokeWidth="2" strokeLinecap="round"/>
                <line x1="12" y1="3" x2="12" y2="15" strokeWidth="2" strokeLinecap="round"/>
            </svg>
        );
        
        const Settings = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="3" strokeWidth="2"/>
                <path d="M12 1v6m0 6v6M5.64 5.64l4.24 4.24m4.24 4.24l4.24 4.24M1 12h6m6 0h6M5.64 18.36l4.24-4.24m4.24-4.24l4.24-4.24" strokeWidth="2" strokeLinecap="round"/>
            </svg>
        );
        
        const Minus = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <line x1="5" y1="12" x2="19" y2="12" strokeWidth="2" strokeLinecap="round"/>
            </svg>
        );
        
        const ChevronRight = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <polyline points="9 18 15 12 9 6" strokeWidth="2" strokeLinecap="round"/>
            </svg>
        );
        
        const Coffee = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path d="M18 8h1a4 4 0 0 1 0 8h-1" strokeWidth="2" strokeLinecap="round"/>
                <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z" strokeWidth="2" strokeLinecap="round"/>
                <line x1="6" y1="1" x2="6" y2="4" strokeWidth="2" strokeLinecap="round"/>
                <line x1="10" y1="1" x2="10" y2="4" strokeWidth="2" strokeLinecap="round"/>
                <line x1="14" y1="1" x2="14" y2="4" strokeWidth="2" strokeLinecap="round"/>
            </svg>
        );

        function OvertimeTracker() {
            const [workStart, setWorkStart] = useState('09:00');
            const [workEnd, setWorkEnd] = useState('17:00');
            const [isConfigured, setIsConfigured] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [todayEnd, setTodayEnd] = useState('');
            const [hadLunch, setHadLunch] = useState(true);
            const [overtimeTotal, setOvertimeTotal] = useState(0);
            const [logEntries, setLogEntries] = useState([]);
            const [showLog, setShowLog] = useState(false);
            const [takeOffAmount, setTakeOffAmount] = useState('');

            useEffect(() => {
                const savedStart = localStorage.getItem('workStart');
                const savedEnd = localStorage.getItem('workEnd');
                const savedTotal = localStorage.getItem('overtimeTotal');
                const savedLog = localStorage.getItem('logEntries');
                const configured = localStorage.getItem('isConfigured');

                if (savedStart) setWorkStart(savedStart);
                if (savedEnd) setWorkEnd(savedEnd);
                if (savedTotal) setOvertimeTotal(parseFloat(savedTotal));
                if (savedLog) setLogEntries(JSON.parse(savedLog));
                if (configured) setIsConfigured(true);
            }, []);

            const saveSettings = () => {
                localStorage.setItem('workStart', workStart);
                localStorage.setItem('workEnd', workEnd);
                localStorage.setItem('isConfigured', 'true');
                setIsConfigured(true);
                setShowSettings(false);
            };

            const resetData = () => {
                if (window.confirm('Are you sure you want to reset all data? This cannot be undone!')) {
                    localStorage.clear();
                    setOvertimeTotal(0);
                    setLogEntries([]);
                    setIsConfigured(false);
                    setShowSettings(false);
                }
            };

            const calculateOvertimeHours = (endTime, tookLunch) => {
                const [startHour, startMin] = workStart.split(':').map(Number);
                const [endHour, endMin] = workEnd.split(':').map(Number);
                const [actualHour, actualMin] = endTime.split(':').map(Number);

                const lunchDeduction = tookLunch ? 60 : 0;
                
                const standardMinutes = (endHour * 60 + endMin) - (startHour * 60 + startMin) - 60;
                const actualMinutes = (actualHour * 60 + actualMin) - (startHour * 60 + startMin) - lunchDeduction;
                
                const overtimeMinutes = actualMinutes - standardMinutes;
                return overtimeMinutes / 60;
            };

            const logOvertime = () => {
                if (!todayEnd) return;

                const overtimeHours = calculateOvertimeHours(todayEnd, hadLunch);
                
                const [startHour, startMin] = workStart.split(':').map(Number);
                const [endHour, endMin] = workEnd.split(':').map(Number);
                const standardDayHours = ((endHour * 60 + endMin) - (startHour * 60 + startMin) - 60) / 60;
                
                const overtimeDays = overtimeHours / standardDayHours;

                const newTotal = overtimeTotal + overtimeDays;
                const entry = {
                    date: new Date().toLocaleDateString('en-GB'),
                    endTime: todayEnd,
                    hadLunch: hadLunch,
                    hours: overtimeHours.toFixed(2),
                    days: overtimeDays.toFixed(2),
                    type: 'earned'
                };

                const newLog = [entry, ...logEntries];
                
                setOvertimeTotal(newTotal);
                setLogEntries(newLog);
                localStorage.setItem('overtimeTotal', newTotal.toString());
                localStorage.setItem('logEntries', JSON.stringify(newLog));
                setTodayEnd('');
                setHadLunch(true);
            };

            const logRegularDay = () => {
                const entry = {
                    date: new Date().toLocaleDateString('en-GB'),
                    endTime: workEnd,
                    hadLunch: true,
                    hours: '0.00',
                    days: '0.00',
                    type: 'regular'
                };

                const newLog = [entry, ...logEntries];
                setLogEntries(newLog);
                localStorage.setItem('logEntries', JSON.stringify(newLog));
            };

            const takeTimeOff = () => {
                if (!takeOffAmount || parseFloat(takeOffAmount) <= 0) return;

                const amount = parseFloat(takeOffAmount);
                if (amount > overtimeTotal) {
                    alert('You don\'t have that much overtime saved!');
                    return;
                }

                const newTotal = overtimeTotal - amount;
                const entry = {
                    date: new Date().toLocaleDateString('en-GB'),
                    days: amount.toFixed(2),
                    type: 'used'
                };

                const newLog = [entry, ...logEntries];
                
                setOvertimeTotal(newTotal);
                setLogEntries(newLog);
                localStorage.setItem('overtimeTotal', newTotal.toString());
                localStorage.setItem('logEntries', JSON.stringify(newLog));
                setTakeOffAmount('');
            };

            const exportData = () => {
                const data = {
                    workStart,
                    workEnd,
                    overtimeTotal,
                    logEntries,
                    exportDate: new Date().toISOString()
                };
                
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `overtime-backup-${new Date().toISOString().split('T')[0]}.json`;
                a.click();
            };

            const importData = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        setWorkStart(data.workStart);
                        setWorkEnd(data.workEnd);
                        setOvertimeTotal(data.overtimeTotal);
                        setLogEntries(data.logEntries);
                        
                        localStorage.setItem('workStart', data.workStart);
                        localStorage.setItem('workEnd', data.workEnd);
                        localStorage.setItem('overtimeTotal', data.overtimeTotal.toString());
                        localStorage.setItem('logEntries', JSON.stringify(data.logEntries));
                        localStorage.setItem('isConfigured', 'true');
                        
                        setIsConfigured(true);
                        alert('Data imported successfully!');
                    } catch (error) {
                        alert('Error importing file. Please check the file format.');
                    }
                };
                reader.readAsText(file);
            };

            if (!isConfigured || showSettings) {
                return (
                    <div className="min-h-screen bg-gradient-to-br from-purple-50 to-blue-50 p-4">
                        <div className="max-w-md mx-auto pt-8">
                            <div className="bg-white rounded-3xl shadow-xl p-8">
                                <div className="flex items-center justify-center w-16 h-16 bg-gradient-to-br from-purple-500 to-blue-500 rounded-2xl mx-auto mb-6">
                                    <Settings className="w-8 h-8 text-white" />
                                </div>
                                
                                <h2 className="text-2xl font-bold text-center mb-2 text-gray-800">Work Hours Setup</h2>
                                <p className="text-center text-gray-600 mb-8">Set your standard working hours</p>
                                
                                <div className="space-y-6">
                                    <div>
                                        <label className="block text-sm font-semibold text-gray-700 mb-2">Start Time</label>
                                        <input
                                            type="time"
                                            value={workStart}
                                            onChange={(e) => setWorkStart(e.target.value)}
                                            className="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-purple-500 focus:outline-none text-lg"
                                        />
                                    </div>
                                    
                                    <div>
                                        <label className="block text-sm font-semibold text-gray-700 mb-2">End Time</label>
                                        <input
                                            type="time"
                                            value={workEnd}
                                            onChange={(e) => setWorkEnd(e.target.value)}
                                            className="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-purple-500 focus:outline-none text-lg"
                                        />
                                    </div>
                                    
                                    <div className="bg-blue-50 rounded-xl p-4">
                                        <p className="text-sm text-blue-800">
                                            <strong>Note:</strong> A 1-hour lunch break will be assumed by default, but you can toggle it off when logging each day.
                                        </p>
                                    </div>
                                    
                                    <button
                                        onClick={saveSettings}
                                        className="w-full bg-gradient-to-r from-purple-500 to-blue-500 text-white py-4 rounded-xl font-semibold text-lg shadow-lg hover:shadow-xl transition-all"
                                    >
                                        Save Settings
                                    </button>
                                    
                                    {isConfigured && (
                                        <>
                                            <button
                                                onClick={() => setShowSettings(false)}
                                                className="w-full bg-gray-200 text-gray-700 py-3 rounded-xl font-semibold"
                                            >
                                                Cancel
                                            </button>
                                            
                                            <button
                                                onClick={resetData}
                                                className="w-full bg-red-100 text-red-600 py-3 rounded-xl font-semibold hover:bg-red-200 transition-all"
                                            >
                                                Reset All Data
                                            </button>
                                        </>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gradient-to-br from-purple-50 to-blue-50 pb-20">
                    <div className="bg-gradient-to-r from-purple-500 to-blue-500 text-white p-6 rounded-b-3xl shadow-lg">
                        <div className="max-w-md mx-auto">
                            <div className="flex justify-between items-center mb-6">
                                <h1 className="text-2xl font-bold">Overtime Tracker</h1>
                                <button
                                    onClick={() => setShowSettings(true)}
                                    className="p-2 bg-white/20 rounded-xl hover:bg-white/30 transition-all"
                                >
                                    <Settings className="w-6 h-6" />
                                </button>
                            </div>
                            
                            <div className="bg-white/10 backdrop-blur-sm rounded-2xl p-6 border border-white/20">
                                <div className="text-center">
                                    <p className="text-white/80 text-sm mb-2">Total Overtime Accrued</p>
                                    <p className="text-5xl font-bold mb-1">{overtimeTotal.toFixed(1)}</p>
                                    <p className="text-white/80">days</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="max-w-md mx-auto px-4 mt-6 space-y-4">
                        <div className="bg-white rounded-2xl shadow-lg p-6">
                            <div className="flex items-center mb-4">
                                <div className="w-10 h-10 bg-purple-100 rounded-xl flex items-center justify-center mr-3">
                                    <Clock className="w-6 h-6 text-purple-500" />
                                </div>
                                <h2 className="text-xl font-bold text-gray-800">Log Today</h2>
                            </div>
                            
                            <div className="space-y-3">
                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-2">Finish Time</label>
                                    <input
                                        type="time"
                                        value={todayEnd}
                                        onChange={(e) => setTodayEnd(e.target.value)}
                                        className="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-purple-500 focus:outline-none"
                                    />
                                </div>
                                
                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-3">Did you take a lunch break?</label>
                                    <div className="flex gap-3">
                                        <button
                                            onClick={() => setHadLunch(true)}
                                            className={`flex-1 py-3 rounded-xl font-semibold transition-all ${
                                                hadLunch 
                                                    ? 'bg-gradient-to-r from-green-500 to-emerald-500 text-white shadow-md' 
                                                    : 'bg-gray-100 text-gray-600'
                                            }`}
                                        >
                                            <div className="flex items-center justify-center gap-2">
                                                <Coffee className="w-5 h-5" />
                                                Yes
                                            </div>
                                        </button>
                                        <button
                                            onClick={() => setHadLunch(false)}
                                            className={`flex-1 py-3 rounded-xl font-semibold transition-all ${
                                                !hadLunch 
                                                    ? 'bg-gradient-to-r from-orange-500 to-red-500 text-white shadow-md' 
                                                    : 'bg-gray-100 text-gray-600'
                                            }`}
                                        >
                                            No Break
                                        </button>
                                    </div>
                                </div>
                                
                                <div className="grid grid-cols-2 gap-3">
                                    <button
                                        onClick={logOvertime}
                                        disabled={!todayEnd}
                                        className="bg-gradient-to-r from-purple-500 to-blue-500 text-white py-3 rounded-xl font-semibold disabled:opacity-50 disabled:cursor-not-allowed shadow-md hover:shadow-lg transition-all"
                                    >
                                        Log Hours
                                    </button>
                                    
                                    <button
                                        onClick={logRegularDay}
                                        className="bg-gray-200 text-gray-700 py-3 rounded-xl font-semibold hover:bg-gray-300 transition-all"
                                    >
                                        Regular Day
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div className="bg-white rounded-2xl shadow-lg p-6">
                            <div className="flex items-center mb-4">
                                <div className="w-10 h-10 bg-blue-100 rounded-xl flex items-center justify-center mr-3">
                                    <Minus className="w-6 h-6 text-blue-500" />
                                </div>
                                <h2 className="text-xl font-bold text-gray-800">Use Overtime</h2>
                            </div>
                            
                            <div className="space-y-3">
                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-2">Days to Use</label>
                                    <input
                                        type="number"
                                        step="0.5"
                                        value={takeOffAmount}
                                        onChange={(e) => setTakeOffAmount(e.target.value)}
                                        placeholder="0.5"
                                        className="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none"
                                    />
                                </div>
                                
                                <button
                                    onClick={takeTimeOff}
                                    disabled={!takeOffAmount}
                                    className="w-full bg-gradient-to-r from-blue-500 to-cyan-500 text-white py-3 rounded-xl font-semibold disabled:opacity-50 disabled:cursor-not-allowed shadow-md hover:shadow-lg transition-all"
                                >
                                    Use Time Off
                                </button>
                            </div>
                        </div>

                        <div className="bg-white rounded-2xl shadow-lg overflow-hidden">
                            <button
                                onClick={() => setShowLog(!showLog)}
                                className="w-full p-6 flex items-center justify-between hover:bg-gray-50 transition-all"
                            >
                                <div className="flex items-center">
                                    <div className="w-10 h-10 bg-green-100 rounded-xl flex items-center justify-center mr-3">
                                        <Calendar className="w-6 h-6 text-green-500" />
                                    </div>
                                    <h2 className="text-xl font-bold text-gray-800">History</h2>
                                </div>
                                <ChevronRight className={`w-6 h-6 text-gray-400 transition-transform ${showLog ? 'rotate-90' : ''}`} />
                            </button>
                            
                            {showLog && (
                                <div className="border-t border-gray-100">
                                    {logEntries.length === 0 ? (
                                        <p className="p-6 text-center text-gray-500">No entries yet</p>
                                    ) : (
                                        <div className="max-h-96 overflow-y-auto">
                                            {logEntries.map((entry, idx) => (
                                                <div key={idx} className="p-4 border-b border-gray-100 last:border-b-0 hover:bg-gray-50">
                                                    <div className="flex justify-between items-start">
                                                        <div>
                                                            <p className="font-semibold text-gray-800">{entry.date}</p>
                                                            {entry.type === 'earned' && (
                                                                <>
                                                                    <p className="text-sm text-gray-600">Finished at {entry.endTime}</p>
                                                                    <p className="text-xs text-gray-500">
                                                                        {entry.hadLunch ? '✓ Had lunch break' : '✗ No lunch break'}
                                                                    </p>
                                                                </>
                                                            )}
                                                            {entry.type === 'regular' && (
                                                                <p className="text-sm text-gray-600">Regular day</p>
                                                            )}
                                                        </div>
                                                        <div className="text-right">
                                                            {entry.type === 'earned' && (
                                                                <>
                                                                    <p className="text-green-600 font-bold">+{entry.hours} hrs</p>
                                                                    <p className="text-xs text-green-600/70">{entry.days} days</p>
                                                                </>
                                                            )}
                                                            {entry.type === 'used' && (
                                                                <p className="text-red-600 font-bold">-{entry.days} days</p>
                                                            )}
                                                            {entry.type === 'regular' && (
                                                                <p className="text-gray-400 font-bold">0 hrs</p>
                                                            )}
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>

                        <div className="bg-white rounded-2xl shadow-lg p-6">
                            <h2 className="text-xl font-bold text-gray-800 mb-4">Backup & Restore</h2>
                            
                            <div className="grid grid-cols-2 gap-3">
                                <button
                                    onClick={exportData}
                                    className="flex items-center justify-center gap-2 bg-green-500 text-white py-3 rounded-xl font-semibold shadow-md hover:shadow-lg transition-all"
                                >
                                    <Download className="w-5 h-5" />
                                    Export
                                </button>
                                
                                <label className="flex items-center justify-center gap-2 bg-blue-500 text-white py-3 rounded-xl font-semibold cursor-pointer shadow-md hover:shadow-lg transition-all">
                                    <Upload className="w-5 h-5" />
                                    Import
                                    <input
                                        type="file"
                                        accept=".json"
                                        onChange={importData}
                                        className="hidden"
                                    />
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<OvertimeTracker />, document.getElementById('root'));
    </script>
</body>
</html>
